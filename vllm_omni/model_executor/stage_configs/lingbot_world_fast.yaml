stage_args:

  - stage_id: 0
    stage_type: diffusion
    runtime:
      devices: "0"
      requires_multimodal_data: true
    engine_args:
      model_stage: dit
      max_num_seqs: 1
      model_class_name: LingbotWorldFastPipeline
      trust_remote_code: true
      enforce_eager: true
      distributed_executor_backend: "mp"
      num_gpus: 1
      model_paths:
        base_model: robbyant/lingbot-world-base-cam

    final_output: true
    final_output_type: video
    is_comprehension: false
    default_sampling_params:
      seed: 42
      height: 480
      width: 832
      fps: 16
      num_frames: 13

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1

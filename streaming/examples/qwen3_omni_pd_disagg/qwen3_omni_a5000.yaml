# Qwen3-Omni-MoE non-disaggregated streaming stage config, tuned for
# 8x NVIDIA RTX A5000 (24 GB each).
#
# Layout (3 stages on 5 GPUs):
#   stage 0 (thinker, prefill+decode merged)  -> GPUs 0,1,2,3 (TP=4)
#   stage 1 (talker)                          -> GPU 4
#   stage 2 (code2wav)                        -> GPU 4
#   GPUs 5,6,7 left free (profiling / extra replica).
#
# Why no PD-disagg here:
#   * The 30B MoE thinker is ~60 GB in BF16 -> needs at least TP=4 on
#     24 GB cards to fit weights (~15 GB/GPU) plus KV cache.
#   * The PD variant would need TP=4 on prefill AND TP=4 on decode (the
#     two sides must match), which alone consumes all 8 GPUs and leaves
#     no room for talker/code2wav without co-locating with thinker decode.
#   * Without PD-disagg we drop one full TP=4 copy and Mooncake KV
#     transport, freeing 3 GPUs and ~60 GB of weight RAM.
#
# Compared to streaming/examples/qwen3_omni_pd_disagg/qwen3_omni_pd_disagg.yaml:
#   * stages 0+1 merged -> single thinker stage that emits `latent`
#     (talker still needs hidden states via `thinker2talker`) AND surfaces
#     text via `final_output_type: text` so SSE streaming works.
#   * `kv_transfer_config` and Mooncake bootstrap ports removed.
#   * `runtime.edges` updated for the 3-stage chain.
#   * `max_num_batched_tokens` lowered to 8192 (A5000 has ~9 GB free per
#     GPU after thinker weights at TP=4; 32768-token prefill activations
#     would OOM).
#   * `max_num_seqs` halved to keep KV cache within the per-GPU headroom.
stage_args:
  - stage_id: 0
    runtime:
      devices: "0,1,2,3"
    engine_args:
      max_num_seqs: 32
      model_stage: thinker
      model_arch: Qwen3OmniMoeForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.92
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 8192
      hf_config_name: thinker_config
      tensor_parallel_size: 4
    final_output: true
    final_output_type: text
    is_comprehension: true
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 42
      detokenize: true
      repetition_penalty: 1.05

  - stage_id: 1
    runtime:
      devices: "4"
    engine_args:
      max_num_seqs: 32
      model_stage: talker
      model_arch: Qwen3OmniMoeForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.6
      trust_remote_code: true
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      hf_config_name: talker_config
      tensor_parallel_size: 1
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.thinker2talker
    final_output: false
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      detokenize: false
      repetition_penalty: 1.05

  - stage_id: 2
    runtime:
      devices: "4"
    engine_args:
      max_num_seqs: 1
      model_stage: code2wav
      enforce_eager: true
      gpu_memory_utilization: 0.1
      trust_remote_code: true
      enable_prefix_caching: false
    engine_input_source: [1]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.talker2code2wav
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      detokenize: true
      repetition_penalty: 1.1

runtime:
  enabled: true
  edges:
    - from: 0
      to: 1
    - from: 1
      to: 2
